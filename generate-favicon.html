<!DOCTYPE html>
<html>
<head>
    <title>Generate Favicon</title>
</head>
<body>
    <h2>Favicon Generator</h2>
    <canvas id="canvas" width="512" height="512"></canvas>
    <br>
    <button onclick="download(32, 'favicon-32x32.png')">Download 32x32</button>
    <button onclick="download(192, 'android-chrome-192x192.png')">Download 192x192</button>
    <button onclick="download(512, 'android-chrome-512x512.png')">Download 512x512</button>
    <button onclick="download(180, 'apple-touch-icon.png')">Download Apple Touch Icon</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Experience Digest shield+plus favicon
        const size = 512;
        const cx = size / 2;
        const cy = size / 2;
        
        // Draw shield outline (filled)
        ctx.fillStyle = '#14b8a6';
        ctx.beginPath();
        // Shield shape: pointed bottom, flat top with slight curve
        ctx.moveTo(cx, size * 0.04);  // top center
        ctx.lineTo(size * 0.12, size * 0.2);  // top-left
        ctx.lineTo(size * 0.12, size * 0.5);  // mid-left
        ctx.quadraticCurveTo(size * 0.12, size * 0.78, cx, size * 0.96);  // bottom curve left
        ctx.quadraticCurveTo(size * 0.88, size * 0.78, size * 0.88, size * 0.5);  // bottom curve right
        ctx.lineTo(size * 0.88, size * 0.2);  // mid-right to top-right
        ctx.closePath();
        ctx.fill();
        
        // Draw shield inner (dark background)
        ctx.fillStyle = '#0f0f0f';
        ctx.beginPath();
        const inset = size * 0.06;
        ctx.moveTo(cx, size * 0.04 + inset * 0.7);
        ctx.lineTo(size * 0.12 + inset, size * 0.2 + inset * 0.5);
        ctx.lineTo(size * 0.12 + inset, size * 0.5);
        ctx.quadraticCurveTo(size * 0.12 + inset, size * 0.75, cx, size * 0.92);
        ctx.quadraticCurveTo(size * 0.88 - inset, size * 0.75, size * 0.88 - inset, size * 0.5);
        ctx.lineTo(size * 0.88 - inset, size * 0.2 + inset * 0.5);
        ctx.closePath();
        ctx.fill();
        
        // Draw plus sign
        ctx.strokeStyle = '#14b8a6';
        ctx.lineWidth = size * 0.06;
        ctx.lineCap = 'round';
        
        // Vertical line of plus
        ctx.beginPath();
        ctx.moveTo(cx, cy - size * 0.15);
        ctx.lineTo(cx, cy + size * 0.15);
        ctx.stroke();
        
        // Horizontal line of plus
        ctx.beginPath();
        ctx.moveTo(cx - size * 0.15, cy);
        ctx.lineTo(cx + size * 0.15, cy);
        ctx.stroke();
        
        function download(size, filename) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = size;
            tempCanvas.height = size;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0, size, size);
            
            tempCanvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            });
        }
    </script>
</body>
</html>
